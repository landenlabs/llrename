name: Build

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project llrename.xcodeproj \
            -target llrename \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT=$PWD/build \
            build

      - name: Package
        run: zip llrename-macos.zip build/Release/llrename

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: llrename-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild llrename-ms/llrename.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "llrename.exe" |
                 Where-Object { $_.DirectoryName -match "Release" } |
                 Select-Object -First 1
          Copy-Item $exe.FullName "llrename.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: llrename.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          files: |
            macos-binary/llrename-macos.zip
            windows-binary/llrename.exe

      - name: Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            macos-binary/llrename-macos.zip
            windows-binary/llrename.exe
